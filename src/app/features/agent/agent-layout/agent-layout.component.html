<div class="flex h-screen overflow-hidden" style="background: var(--bg-page);">

  <!-- Mobile backdrop -->
  <div class="sidebar-backdrop" [class.open]="!collapsed()" (click)="toggle()"></div>

  <!-- ── Sidebar ─────────────────────────────────────────────────────────── -->
  <aside class="sidebar" [class.sidebar-collapsed]="collapsed()">

    <!-- Brand -->
    <div class="sidebar-brand">
      <div class="sidebar-logo" (click)="toggle()" style="cursor:pointer;">
        <img src="assets/logo.png" alt="Kawader" style="width:34px;height:34px;object-fit:cover;border-radius:10px;" />
      </div>
      <div class="sidebar-brand-text">
        <span class="sidebar-brand-name">{{ 'brand.name' | translate }}</span>
        <span class="sidebar-brand-tagline">{{ 'brand.tagline' | translate }}</span>
      </div>
    </div>

    <!-- Nav -->
    <nav class="sidebar-nav">
      <a routerLink="/dashboard/agent" [routerLinkActiveOptions]="{exact:true}"
        routerLinkActive="sidebar-active" class="sidebar-link">
        <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8">
          <path stroke-linecap="round" stroke-linejoin="round"
            d="M3.75 21h16.5M4.5 3h15M5.25 3v18m13.5-18v18M9 6.75h1.5m-1.5 3h1.5m-1.5 3h1.5m3-6H15m-1.5 3H15m-1.5 3H15M9 21v-3.375c0-.621.504-1.125 1.125-1.125h3.75c.621 0 1.125.504 1.125 1.125V21"/>
        </svg>
        <span class="sidebar-link-label">{{ 'agent.nav.myCompanies' | translate }}</span>
      </a>
    </nav>

    <!-- Footer -->
    <div class="sidebar-footer">
      <div class="sidebar-footer-controls">
        <app-language-switcher />
        <app-theme-switcher />
      </div>
      <div class="sidebar-user-row">
        <div class="w-[26px] h-[26px] rounded-full flex items-center justify-center text-[10px] font-black flex-shrink-0"
          style="background: linear-gradient(135deg, var(--nav-accent) 0%, #7c3aed 100%); color: #fff; cursor: default;"
          [title]="displayName()">
          {{ displayName().charAt(0).toUpperCase() }}
        </div>
        <span class="sidebar-user-name">{{ displayName() }}</span>
        <button (click)="signOut()" class="sidebar-user-action" [title]="'nav.signOut' | translate">
          <svg style="width:13px;height:13px;" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/>
          </svg>
        </button>
      </div>
      <button (click)="toggle()" class="sidebar-toggle">
        <svg class="sidebar-toggle-icon" style="width:14px;height:14px;"
          [style.transform]="collapsed() ? 'scaleX(-1)' : 'scaleX(1)'"
          fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round"
            d="M11.25 9l-3 3m0 0l3 3m-3-3h7.5M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
        </svg>
      </button>
    </div>

  </aside>

  <!-- ── Main content ─────────────────────────────────────────────────────── -->
  <main class="flex-1 min-w-0 overflow-y-auto overflow-x-hidden auth-scroll flex flex-col">
    <!-- Mobile topbar -->
    <div class="sm:hidden flex items-center gap-3 px-4 h-14 flex-shrink-0 sticky top-0 z-10"
      style="background: var(--bg-surface); border-bottom: 1px solid var(--border);">
      <button (click)="toggle()"
        class="w-9 h-9 inline-flex items-center justify-center rounded-xl flex-shrink-0"
        style="background: var(--bg-subtle-sm); color: var(--text-faint);">
        <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M3.75 6.75h16.5M3.75 12h16.5m-16.5 5.25h16.5"/>
        </svg>
      </button>
      <img src="assets/logo.png" alt="Kawader" style="width:28px;height:28px;border-radius:8px;object-fit:cover;flex-shrink:0;" />
      <span class="font-bold text-sm" style="color: var(--text-base);">{{ 'brand.name' | translate }}</span>
    </div>
    <app-offline-banner />
    <div class="p-4 sm:p-6 flex-1">
      <router-outlet />
    </div>
  </main>

</div>
