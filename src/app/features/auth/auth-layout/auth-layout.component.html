<div class="relative min-h-screen overflow-hidden" style="background: var(--auth-bg); transition: background 0.25s;">

  <!-- Blob shapes -->
  @for (b of blobs; track $index) {
    <div
      class="auth-blob"
      [style.top]="b.top"
      [style.left]="b.left"
      [style.width]="b.width"
      [style.height]="b.height"
      [style.--rot]="b.rot"
      [style.transform]="'rotate(' + b.rot + ')'"
      [style.animation-delay]="b.delay"
      [style.animation-duration]="b.duration"
    ></div>
  }

  <!-- Sparkles -->
  @for (s of sparkles; track $index) {
    <span
      class="auth-sparkle"
      [style.top]="s.top"
      [style.left]="s.left"
      [style.font-size]="s.size"
      [style.animation-duration]="s.duration"
      [style.animation-delay]="s.delay"
    >✦</span>
  }

  <!-- Page content (centered, scrollable) -->
  <div class="relative z-10 min-h-screen flex flex-col items-center px-4 py-10 overflow-y-auto auth-scroll">
    <div [@routeAnim]="routeAnim()" class="w-full flex items-center justify-center my-auto">
      <router-outlet />
    </div>
  </div>

</div>
