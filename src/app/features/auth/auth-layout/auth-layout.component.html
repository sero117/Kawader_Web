<div
  class="relative min-h-screen overflow-hidden bg-gradient-to-br from-indigo-950 via-blue-900 to-indigo-950"
  (mousemove)="onMouseMove($event)"
>
  <!-- Static decorative blobs -->
  <div class="absolute pointer-events-none -bottom-64 -left-64 w-[640px] h-[640px] rounded-full bg-indigo-600/10 blur-[130px]"></div>
  <div class="absolute pointer-events-none -top-64 -right-64 w-[540px] h-[540px] rounded-full bg-blue-500/10 blur-[110px]"></div>
  <div class="absolute pointer-events-none top-1/3 left-1/2 -translate-x-1/2 w-[380px] h-[380px] rounded-full bg-violet-600/10 blur-[90px]"></div>

  <!-- Mouse-following light orb -->
  <div
    class="mouse-orb"
    [style.left]="mouseX() + '%'"
    [style.top]="mouseY() + '%'"
  ></div>

  <!-- Floating particles -->
  @for (p of particles; track $index) {
    <span
      class="auth-particle"
      [style.left]="p.left"
      [style.width]="p.size"
      [style.height]="p.size"
      [style.animation-duration]="p.duration"
      [style.animation-delay]="p.delay"
    ></span>
  }

  <!-- Subtle dot grid overlay -->
  <div
    class="absolute inset-0 pointer-events-none"
    style="opacity: 0.025; background-image: radial-gradient(circle, rgba(255,255,255,0.9) 1px, transparent 1px); background-size: 44px 44px;"
  ></div>

  <!-- Page content (centered) -->
  <div class="relative z-10 min-h-screen flex items-center justify-center px-4 py-12 overflow-y-auto auth-scroll">
    <div [@routeAnim]="prepareRoute(outlet)" class="w-full flex items-center justify-center">
      <router-outlet #outlet="outlet" />
    </div>
  </div>
</div>
